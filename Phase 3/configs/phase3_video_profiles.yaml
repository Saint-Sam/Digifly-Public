      hind_scale: 0.5
      zero_actuators: ["abdomen"]
    control_map:
      target_ctrl_fraction: 0.68
      percentile: 95.0
      bias_to_mid: true
      clip: true
    render:
      camera_name: track2
      camera_distance_factor: 9.0
      camera_fovy_deg: 75.0
