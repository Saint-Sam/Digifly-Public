default_profile: biological_18s_preview

profiles:
  realistic_baseline:
    signal:
      loop_total_ms: 80.0
      settle_ms: 0.0
      right_leg_phase_ms: 0.0
      ramp_ms: 1.5
      front_scale: 1.0
      mid_scale: 1.0
      hind_scale: 1.0
      zero_actuators: []
    control_map:
      target_ctrl_fraction: 0.55
      percentile: 95.0
      bias_to_mid: true
      clip: true
    render:
      camera_name: track2
      camera_distance_factor: 8.0
      camera_fovy_deg: 75.0
      render_hz: 120
      slowmo: 12.0
      width: 1280
      height: 720

  balanced_showcase:
